---
layout: default
---

<article>
  <header>
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
      {% if page.date %}{{ page.date | date: "%Y-%m-%d" }}{% endif %}
      {% if page.categories and page.categories.size > 0 %}
      | {{ page.categories | join: ", " }}
      {% endif %}
    </p>
  </header>
  {{ content }}
</article>
